name: Build Mbest700
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build
      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: Mbest700-1.21.4
          path: build/libs/*.jar
          
